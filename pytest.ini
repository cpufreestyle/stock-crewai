[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出设置
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 运行较慢的测试
    api: 需要外部 API 的测试
    live: 需要真实数据的测试（可能产生交易）

# 覆盖率设置
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */node_modules/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
