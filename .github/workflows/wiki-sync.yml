name: Auto-sync Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Wiki
        run: |
          mkdir -p wiki
          cat > wiki/index.md << 'EOF'
          # 📁 Stock CrewAI Wiki

          > 自动生成 · 最后更新: $(date '+%Y-%m-%d %H:%M')

          ## 项目信息

          - **GitHub**: https://github.com/cpufreestyle/stock-crewai
          - **技术**: CrewAI 多 Agent 股票分析

          ## 最近提交

          EOF
          git log --oneline -10 --format="- %s (%h) · %ad" --date=short >> wiki/index.md
          echo "" >> wiki/index.md
          echo "---" >> wiki/index.md
          echo "" >> wiki/index.md
          echo "_由 GitHub Actions 自动生成_" >> wiki/index.md

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add wiki/
          git diff --cached --quiet || exit 0
          git commit -m "docs(wiki): auto-sync [skip ci]"
          git push
