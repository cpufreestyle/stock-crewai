name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black isort flake8

      - name: Check code format (Black)
        run: |
          black --check . || true

      - name: Check import order (isort)
        run: |
          isort --check-only --diff . || true

      - name: Lint (flake8)
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__,.git,.github || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build -t stock-crewai:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d --name test-container \
            -e OPENAI_API_KEY=test \
            stock-crewai:${{ github.sha }}
          sleep 5
          docker logs test-container
          docker rm -f test-container

  lint-docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check README exists
        run: |
          test -f README.md && echo "README.md exists" || exit 1

      - name: Check docs exist
        run: |
          test -d docs && echo "docs/ directory exists" || echo "No docs/ directory"

      - name: Check OpenAPI spec
        if: false
        run: |
          test -f docs/openapi.yaml && echo "OpenAPI spec exists" || echo "No OpenAPI spec"
