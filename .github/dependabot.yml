version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # 排除不使用的包，避免误升级
    ignore:
      - dependency-name: transformers
      - dependency-name: torch
      - dependency-name: numpy
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
